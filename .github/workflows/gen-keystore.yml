name: Generate signing key (one-off)

# Run this ONCE from the Actions tab. It creates the permanent signing key the
# app is signed with, so future updates install over the top without wiping
# Alex's saved beers. Download the "release-keystore" artifact, commit it to
# android/keystore/release.jks, then this workflow can be deleted.

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias alexsbeers \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass alexsbeers -keypass alexsbeers \
            -dname "CN=Alexs Beers, OU=Personal, O=Greg Hicks, L=Christchurch, C=NZ"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.jks
          if-no-files-found: error
